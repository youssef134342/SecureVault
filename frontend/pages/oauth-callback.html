<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Completing Login...</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      color: white;
    }
    .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    h1 {
      margin: 20px 0 10px;
      font-size: 24px;
      font-weight: 600;
    }
    p {
      opacity: 0.9;
      font-size: 16px;
    }
    .error {
      color: #ff6b6b;
      margin-top: 30px;
      padding: 20px;
      background: rgba(0,0,0,0.2);
      border-radius: 8px;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="spinner"></div>
  <h1>Completing Login</h1>
  <p>Setting up your session...</p>
  <div id="error" class="error" style="display: none;"></div>
</div>

<script>
// Get the OAuth response from parent window if opened by OAuth flow
async function handleOAuthCallback() {
  try {
    // Parse query parameters for potential auth data
    const params = new URLSearchParams(window.location.search);
    
    // If there's an error from OAuth
    if (params.get('error')) {
      showError(params.get('error_description') || params.get('error'));
      return;
    }

    // Check if we have a message parameter with auth data
    const message = params.get('message');
    if (message) {
      try {
        const authData = JSON.parse(decodeURIComponent(message));
        saveAuth(authData);
        window.location.href = '/pages/dashboard.html';
        return;
      } catch (e) {
        // Not JSON, continue
      }
    }

    // If no direct OAuth response, check if we should wait for postMessage from opener
    if (window.opener) {
      // OAuth was opened in a popup - signal we're ready
      window.opener.postMessage({ type: 'oauth-callback-ready' }, '*');
      // Wait for response
      window.addEventListener('message', (e) => {
        if (e.data.type === 'oauth-response') {
          saveAuth(e.data.auth);
          window.close();
          return;
        }
      });
      return;
    }

    showError('OAuth callback incomplete. Please try again.');
  } catch (err) {
    showError(err.message);
  }
}

function showError(msg) {
  document.getElementById('error').textContent = msg;
  document.getElementById('error').style.display = 'block';
  document.querySelector('h1').textContent = 'Login Failed';
  document.querySelector('p').textContent = 'Redirecting back to login...';
  setTimeout(() => {
    window.location.href = '/';
  }, 3000);
}

function saveAuth(authData) {
  localStorage.setItem('access_token', authData.access_token);
  localStorage.setItem('refresh_token', authData.refresh_token);
  localStorage.setItem('user', JSON.stringify(authData.user));
}

handleOAuthCallback();
</script>

</body>
</html>
